<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elfmeter WM 2026 — Penalty Shootout</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#0b1020;
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif; color:#fff; }
  #app { position:fixed; inset:0; }
  canvas { display:block; }

  /* ---- Overlays ---- */
  .overlay { position:fixed; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; z-index:10;
    background:radial-gradient(circle at 50% 30%, rgba(20,40,80,.85), rgba(5,8,20,.96)); }
  .hidden { display:none !important; }
  h1 { font-size:clamp(28px,6vw,64px); letter-spacing:1px;
    text-shadow:0 4px 20px rgba(0,150,255,.5); text-align:center; }
  h1 small { display:block; font-size:.4em; font-weight:400; color:#9cc7ff; letter-spacing:3px; margin-top:6px;}
  .sub { color:#9fb3d1; font-size:clamp(14px,2.2vw,19px); text-align:center; max-width:680px; line-height:1.5;}
  .btnrow { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; }
  button { cursor:pointer; border:none; border-radius:12px; padding:14px 26px;
    font-size:17px; font-weight:600; color:#fff; transition:transform .1s, box-shadow .2s;
    background:linear-gradient(135deg,#2a6cff,#1b3fb0); box-shadow:0 6px 18px rgba(20,80,200,.4); }
  button:hover { transform:translateY(-2px); box-shadow:0 10px 26px rgba(20,80,200,.6); }
  button.diff { min-width:150px; text-align:center; padding:14px 18px; border-radius:14px;
    color:#fff; font-weight:700; border:1px solid rgba(255,255,255,.16);
    background:linear-gradient(135deg,#1f2b48,#141d33); box-shadow:0 8px 22px rgba(0,0,0,.45);
    transition:transform .12s, filter .2s, box-shadow .2s; }
  button.diff small { display:block; font-weight:400; color:rgba(255,255,255,.82); font-size:12px; margin-top:4px;}
  button.diff:hover { transform:translateY(-4px); filter:brightness(1.13); }
  /* jeder Grad sieht anders aus */
  button.diff.amateur    { background:linear-gradient(135deg,#27c06a,#0c5a2e); }
  button.diff.halbprofi  { background:linear-gradient(135deg,#36a0ff,#13408f); border-radius:10px; }
  button.diff.profi      { background:linear-gradient(135deg,#ff9a2b,#a8500f); border-radius:20px; }
  button.diff.weltklasse { background:linear-gradient(135deg,#ff5a3c,#7a1d6b); border-radius:14px 14px 4px 4px; }
  button.diff.legende    { background:linear-gradient(135deg,#2a2a2a,#000); border:2px solid #ffd24a;
    box-shadow:0 0 22px rgba(255,210,74,.55); transform:scale(1.08); min-width:172px; }
  button.diff.legende small { color:#ffd24a; }
  button.diff.legende:hover { transform:scale(1.08) translateY(-4px); }
  button.ghost { background:transparent; border:1px solid #44557d; box-shadow:none; }

  /* ---- HUD ---- */
  #hud { position:fixed; top:0; left:0; right:0; z-index:5; pointer-events:none;
    display:flex; flex-direction:column; align-items:center; gap:6px; padding-top:14px; }
  .scorebar { display:flex; align-items:center; gap:16px; background:rgba(8,14,30,.72);
    padding:10px 22px; border-radius:14px; backdrop-filter:blur(6px); border:1px solid rgba(120,160,255,.18);}
  .team { display:flex; flex-direction:column; align-items:center; gap:2px; min-width:120px;}
  .team .nm { font-weight:700; font-size:15px; }
  .team .flag { width:34px; height:22px; border-radius:3px; border:1px solid rgba(255,255,255,.25);}
  .dots { display:flex; gap:5px; margin-top:3px; }
  .dot { width:11px; height:11px; border-radius:50%; background:#33425f; border:1px solid #3a4a6a;}
  .dot.g { background:#3ad36b; box-shadow:0 0 8px #3ad36b; }
  .dot.m { background:#e8556a; }
  .vs { font-size:22px; font-weight:800; color:#ffd24a; }
  .roundlbl { font-size:13px; letter-spacing:2px; color:#9fb3d1; text-transform:uppercase;}
  #phasehint { position:fixed; bottom:26px; left:0; right:0; text-align:center; z-index:5;
    font-size:clamp(15px,2.4vw,20px); color:#eaf2ff; pointer-events:none;
    text-shadow:0 2px 12px rgba(0,0,0,.8); }
  #phasehint b { color:#ffd24a; }
  #flash { position:fixed; inset:0; z-index:6; display:flex; align-items:center; justify-content:center;
    font-size:clamp(40px,10vw,120px); font-weight:900; pointer-events:none; opacity:0;
    text-shadow:0 6px 30px rgba(0,0,0,.7); }

  /* ---- Bracket ---- */
  #bracket .rounds { display:flex; gap:22px; align-items:center; flex-wrap:wrap; justify-content:center;}
  .rcol { display:flex; flex-direction:column; gap:8px; }
  .rcol h3 { font-size:12px; letter-spacing:1px; color:#8fa6c9; text-align:center; margin-bottom:4px;}
  .slot { background:rgba(20,30,52,.8); border:1px solid #2c3a5c; border-radius:8px;
    padding:7px 12px; font-size:13px; min-width:140px; display:flex; align-items:center; gap:8px;}
  .slot .flag { width:22px; height:14px; border-radius:2px;}
  .slot.win { border-color:#3ad36b; }
  .slot.me { background:rgba(40,80,160,.6); border-color:#3a7bff; font-weight:700;}
  .slot.next { outline:2px solid #ffd24a; }

  /* 3D-Kabine als Startseite (WebGL liegt dahinter) */
  #menu { background:transparent; overflow:hidden; justify-content:flex-start; padding-top:7vh; }
  #fanbg { display:none; }
  #menu > * { position:relative; z-index:1; }
  #menu h1 { text-shadow:0 4px 24px rgba(0,0,0,.85), 0 0 10px rgba(0,150,255,.4); }
  #menu .sub { text-shadow:0 2px 10px rgba(0,0,0,.9); }
  /* Schwierigkeit: untere Leiste, cleane & unterschiedliche Buttons */
  #diffRow { position:absolute; bottom:5vh; left:0; right:0; z-index:2; display:flex; gap:14px;
    justify-content:center; align-items:flex-end; flex-wrap:wrap; padding:0 20px; }

  /* Weltmeister-Siegerszene (Pokal + Feuerwerk) */
  #winfx { position:absolute; inset:0; z-index:0; display:none; }
  #result.champion, #result.victory { justify-content:flex-end; padding-bottom:5vh;
    background:radial-gradient(circle at 50% 42%, rgba(20,20,55,.15), rgba(4,5,16,.55)); }
  #result.champion #winfx, #result.victory #winfx { display:block; }
  #result > *:not(#winfx) { position:relative; z-index:1; }

  /* Konfetti bei Toren */
  #confetti { position:fixed; inset:0; z-index:8; pointer-events:none; overflow:hidden; }
  .cf { position:absolute; width:10px; height:14px; border-radius:2px; will-change:transform,opacity; }
  @keyframes cffall { to { transform:translateY(115vh) rotate(720deg); opacity:.2; } }
</style>
</head>

<!-- Team select -->
<div id="teamsel" class="overlay hidden">

  <div class="btnrow" id="teamRow" style="max-width:900px"></div>
</div>

<!-- Bracket -->
<div id="bracket" class="overlay hidden">
  <h1 style="font-size:clamp(24px,5vw,40px)" id="bracketTitle">Turnierbaum</h1>

  <div class="btnrow"><button id="bracketGo">Weiter ➜</button></div>
</div>

<!-- Match intro -->
<div id="intro" class="overlay hidden">
  <div class="roundlbl" id="introRound"></div>
  <h1 id="introVs" style="font-size:clamp(24px,5vw,46px)"></h1>
  <p class="sub" id="introSub"></p>
  <div class="btnrow"><button id="introGo">Anpfiff ⚽</button></div>
</div>

<!-- Result -->
<div id="result" class="overlay hidden">
  <canvas id="winfx"></canvas>
  <h1 id="resultTitle"></h1>
  <p class="sub" id="resultSub"></p>
  <div class="btnrow" id="resultBtns"></div>
</div>

<script type="module">

/* =========================================================================

const TEAMS = [

].map(([name,colors,players],i)=>({name,kit:colors[0],trim:colors[1],players,id:i}));

const DIFFS = {
  amateur:    {label:"Amateur",    sub:"Noch gut machbar",      aiAcc:0.48, aiSave:0.12, base:0.10},
  halbprofi:  {label:"Halbprofi",  sub:"Fordernd",              aiAcc:0.66, aiSave:0.26, base:0.20},
  profi:      {label:"Profi",      sub:"Schwer",                aiAcc:0.80, aiSave:0.42, base:0.30},
  weltklasse: {label:"Weltklasse", sub:"Sehr schwer",           aiAcc:0.92, aiSave:0.60, base:0.44},
  legende:    {label:"Legende",    sub:"Fast unmöglich",        aiAcc:0.99, aiSave:0.82, base:0.60},
};
const ROUND_NAMES = ["Sechzehntelfinale","Achtelfinale","Viertelfinale","Halbfinale","Finale"];
const SKINS = [0xf1c9a5,0xe0a878,0xc68642,0x8d5524,0x5a3214,0xffdbac];

/* =========================================================================
   1b) FLAGGEN — realistische Nationalflaggen auf Canvas zeichnen
   ========================================================================= */
function vstripes(x,W,H,c){ const w=W/c.length; c.forEach((col,i)=>{x.fillStyle=col;x.fillRect(i*w,0,w+1,H);}); }
function hstripes(x,W,H,c){ const h=H/c.length; c.forEach((col,i)=>{x.fillStyle=col;x.fillRect(0,i*h,W,h+1);}); }
function hbands(x,W,H,b){ let y=0; for(const k of b){ x.fillStyle=k.c; const bh=H*k.f; x.fillRect(0,y,W,bh+1); y+=bh; } }
function vbands(x,W,H,b){ let xx=0; for(const k of b){ x.fillStyle=k.c; const bw=W*k.f; x.fillRect(xx,0,bw+1,H); xx+=bw; } }
function nordic(x,W,H,bg,cr){ x.fillStyle=bg;x.fillRect(0,0,W,H); x.fillStyle=cr;
  const cw=H*0.18, vx=W*0.34; x.fillRect(vx-cw/2,0,cw,H); x.fillRect(0,H/2-cw/2,W,cw); }
function crossFlag(x,W,H,bg,cr){ x.fillStyle=bg;x.fillRect(0,0,W,H); x.fillStyle=cr;
  const cw=H*0.18; x.fillRect(W/2-cw/2,0,cw,H); x.fillRect(0,H/2-cw/2,W,cw); }
function plusFlag(x,W,H,bg,cr){ x.fillStyle=bg;x.fillRect(0,0,W,H); x.fillStyle=cr;
  const a=H*0.2, L=H*0.62; x.fillRect(W/2-a/2,H/2-L/2,a,L); x.fillRect(W/2-L/2,H/2-a/2,L,a); }
function circleFlag(x,W,H,bg,c,r){ x.fillStyle=bg;x.fillRect(0,0,W,H); x.fillStyle=c;
  x.beginPath();x.arc(W/2,H/2,H*r,0,7);x.fill(); }
function star5(x,cx,cy,R,col,rot){ rot=rot||-Math.PI/2; x.fillStyle=col; x.beginPath();
  for(let i=0;i<5;i++){ const a=rot+i*4*Math.PI/5; i?x.lineTo(cx+Math.cos(a)*R,cy+Math.sin(a)*R):x.moveTo(cx+Math.cos(a)*R,cy+Math.sin(a)*R);} x.closePath();x.fill(); }
function emojiC(x,W,H,e,fr){ x.textAlign='center';x.textBaseline='middle';x.font=`${H*fr}px serif`;x.fillText(e,W/2,H/2); }
function unionJack(x,X,Y,W,H){ x.save();x.beginPath();x.rect(X,Y,W,H);x.clip();
  x.fillStyle='#012169';x.fillRect(X,Y,W,H);
  x.strokeStyle='#fff';x.lineWidth=H*0.2; x.beginPath();x.moveTo(X,Y);x.lineTo(X+W,Y+H);x.moveTo(X+W,Y);x.lineTo(X,Y+H);x.stroke();
  x.strokeStyle='#C8102E';x.lineWidth=H*0.09; x.beginPath();x.moveTo(X,Y);x.lineTo(X+W,Y+H);x.moveTo(X+W,Y);x.lineTo(X,Y+H);x.stroke();
  x.fillStyle='#fff';x.fillRect(X,Y+H/2-H*0.14,W,H*0.28);x.fillRect(X+W/2-W*0.14,Y,W*0.28,H);
  x.fillStyle='#C8102E';x.fillRect(X,Y+H/2-H*0.07,W,H*0.14);x.fillRect(X+W/2-W*0.07,Y,W*0.14,H); x.restore(); }

function drawFlag(x,W,H,name){
  switch(name){
    case 'Frankreich': vstripes(x,W,H,['#0055A4','#FFFFFF','#EF4135']); break;
    case 'Italien': vstripes(x,W,H,['#008C45','#F4F9FF','#CD212A']); break;
    case 'Belgien': vstripes(x,W,H,['#101010','#FDDA24','#EF3340']); break;
    case 'Nigeria': vstripes(x,W,H,['#008751','#FFFFFF','#008751']); break;
    case 'Deutschland': hstripes(x,W,H,['#101010','#DD0000','#FFCE00']); break;
    case 'Niederlande': hstripes(x,W,H,['#AE1C28','#FFFFFF','#21468B']); break;
    case 'Österreich': hstripes(x,W,H,['#ED2939','#FFFFFF','#ED2939']); break;
    case 'Polen': hstripes(x,W,H,['#FFFFFF','#DC143C']); break;
    case 'Serbien': hstripes(x,W,H,['#C6363C','#0C4076','#FFFFFF']); break;
    case 'Argentinien': hstripes(x,W,H,['#74ACDF','#FFFFFF','#74ACDF']); x.fillStyle='#F6B40E';x.beginPath();x.arc(W/2,H/2,H*0.1,0,7);x.fill(); break;
    case 'Spanien': hbands(x,W,H,[{c:'#AA151B',f:.25},{c:'#F1BF00',f:.5},{c:'#AA151B',f:.25}]); x.fillStyle='#AD1519';x.fillRect(W*0.27,H*0.4,W*0.1,H*0.2); break;
    case 'Kolumbien': hbands(x,W,H,[{c:'#FCD116',f:.5},{c:'#003893',f:.25},{c:'#CE1126',f:.25}]); break;
    case 'Ecuador': hbands(x,W,H,[{c:'#FFDD00',f:.5},{c:'#034EA2',f:.25},{c:'#ED1C24',f:.25}]); x.fillStyle='#7a5a00';x.beginPath();x.arc(W/2,H*0.4,H*0.1,0,7);x.fill(); break;
    case 'Ägypten': hstripes(x,W,H,['#CE1126','#FFFFFF','#101010']); x.fillStyle='#C09300';x.beginPath();x.arc(W/2,H/2,H*0.09,0,7);x.fill(); break;
    case 'Ghana': hstripes(x,W,H,['#CE1126','#FCD116','#006B3F']); star5(x,W/2,H/2,H*0.12,'#101010'); break;
    case 'Senegal': vstripes(x,W,H,['#00853F','#FDEF42','#E31B23']); star5(x,W/2,H/2,H*0.13,'#00853F'); break;
    case 'England': crossFlag(x,W,H,'#FFFFFF','#CE1124'); break;
    case 'Dänemark': nordic(x,W,H,'#C8102E','#FFFFFF'); break;
    case 'Schweden': nordic(x,W,H,'#006AA7','#FECC00'); break;
    case 'Schweiz': plusFlag(x,W,H,'#FF0000','#FFFFFF'); break;
    case 'Japan': circleFlag(x,W,H,'#FFFFFF','#BC002D',0.3); break;
    case 'USA': { const sh=H/13; for(let i=0;i<13;i++){x.fillStyle=i%2?'#FFFFFF':'#B22234';x.fillRect(0,i*sh,W,sh+1);}
      x.fillStyle='#3C3B6E';x.fillRect(0,0,W*0.4,sh*7); x.fillStyle='#fff';
      for(let r=0;r<5;r++)for(let cc=0;cc<6;cc++){x.beginPath();x.arc(W*0.4*((cc+0.5)/6),sh*7*((r+0.5)/5),1.1,0,7);x.fill();} break; }
    case 'Brasilien': x.fillStyle='#009C3B';x.fillRect(0,0,W,H);
      x.fillStyle='#FFDF00';x.beginPath();x.moveTo(W*0.5,H*0.12);x.lineTo(W*0.9,H*0.5);x.lineTo(W*0.5,H*0.88);x.lineTo(W*0.1,H*0.5);x.closePath();x.fill();
      x.fillStyle='#002776';x.beginPath();x.arc(W/2,H/2,H*0.22,0,7);x.fill(); break;
    case 'Mexiko': vstripes(x,W,H,['#006847','#FFFFFF','#CE1126']); x.fillStyle='#7a4a1e';x.beginPath();x.arc(W/2,H/2,H*0.1,0,7);x.fill(); break;
    case 'Portugal': vbands(x,W,H,[{c:'#006600',f:.4},{c:'#FF0000',f:.6}]);
      x.fillStyle='#FFD700';x.beginPath();x.arc(W*0.4,H/2,H*0.17,0,7);x.fill();
      x.fillStyle='#fff';x.beginPath();x.arc(W*0.4,H/2,H*0.1,0,7);x.fill();
      x.fillStyle='#003399';x.beginPath();x.arc(W*0.4,H/2,H*0.05,0,7);x.fill(); break;
    case 'Kroatien': hstripes(x,W,H,['#FF0000','#FFFFFF','#171796']);

  drawFlag(c.getContext('2d'),60,40,name); return _flagURL[name]=c.toDataURL(); }
function kitTexForTeam(team){ if(_kitCache[team.id])return _kitCache[team.id];
  const W=160,H=96; const c=document.createElement('canvas'); c.width=W;c.height=H; const x=c.getContext('2d');
  drawFlag(x,W,H,team.name);                 // Flagge als Basis = klare Landesfarben
  // dezente Plastik-Schattierung
  const sh=x.createLinearGradient(0,0,W,0);
  sh.addColorStop(0,'rgba(0,0,0,.22)'); sh.addColorStop(.5,'rgba(255,255,255,.04)'); sh.addColorStop(1,'rgba(0,0,0,.22)');
  x.fillStyle=sh; x.fillRect(0,0,W,H);
  // dezente Neon-Dreiecke (Land bleibt klar erkennbar)
  const NEON=['#39ff14','#00eaff','#ff2bd6','#faff00','#ff6a00','#b026ff'];
  const ts=15; let ti=0;
  for(let r=0;r*ts<H+ts;r++) for(let cc=0;cc*ts<W+ts;cc++){
    const up=(r+cc)%2===0; x.fillStyle=NEON[ti++%NEON.length]; x.globalAlpha=0.3;
    const X=cc*ts,Y=r*ts; x.beginPath();
    if(up){ x.moveTo(X,Y+ts); x.lineTo(X+ts,Y+ts); x.lineTo(X+ts/2,Y); }
    else  { x.moveTo(X,Y);    x.lineTo(X+ts,Y);    x.lineTo(X+ts/2,Y+ts); }
    x.closePath(); x.fill();
  }
  x.globalAlpha=1;
  // klares Flaggen-Wappen auf der Brust -> Land sofort erkennbar
  const bw=Math.round(W*0.28), bh=Math.round(H*0.22), bx=Math.round(W/2-bw/2), by=Math.round(H*0.15);
  const fb=document.createElement('canvas'); fb.width=bw; fb.height=bh; drawFlag(fb.getContext('2d'),bw,bh,team.name);
  x.drawImage(fb,bx,by); x.strokeStyle='rgba(255,255,255,.9)'; x.lineWidth=2; x.strokeRect(bx,by,bw,bh);
  // Kragen
  x.fillStyle='rgba(255,255,255,.5)'; x.fillRect(0,0,W,5);
  x.fillStyle='rgba(0,0,0,.25)';      x.fillRect(0,5,W,2);
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return _kitCache[team.id]=t; }

// Tausende echte 3D-Grashalme (Instancing) im Sichtbereich, im Wind wogend
function buildGrass(){
  const h=0.26, w=0.05;
  const blade=new THREE.PlaneGeometry(w,h,1,3); blade.translate(0,h/2,0);
  const pos=blade.attributes.position, col=[];
  for(let i=0;i<pos.count;i++){ const y=pos.getY(i)/h;            // dunkler Halmgrund -> helle Spitze
    col.push(0.10+0.10*y, 0.40+0.34*y, 0.16+0.10*y); }
  blade.setAttribute('color', new THREE.Float32BufferAttribute(col,3));
  grassUniforms={ uTime:{value:0} };
  grassMat=new THREE.MeshLambertMaterial({vertexColors:true, side:THREE.DoubleSide});
  grassMat.onBeforeCompile=(sh)=>{ sh.uniforms.uTime=grassUniforms.uTime;
    sh.vertexShader='uniform float uTime;\n'+sh.vertexShader.replace('#include <begin_vertex>',
      `#include <begin_vertex>
       float gb = position.y;
       float ph = instanceMatrix[3][0]*0.7 + instanceMatrix[3][2]*0.7;
       transformed.x += sin(uTime*1.6 + ph) * gb * 0.05;
       transformed.z += cos(uTime*1.3 + ph) * gb * 0.03;`);
  };
  const N=48000;
  const mesh=new THREE.InstancedMesh(blade, grassMat, N);
  const d=new THREE.Object3D();
  for(let i=0;i<N;i++){
    d.position.set((Math.random()*2-1)*13, 0, GOAL_Z + Math.random()*(7-GOAL_Z));
    d.rotation.set((Math.random()-0.5)*0.25, Math.random()*Math.PI, (Math.random()-0.5)*0.3);
    const s=0.8+Math.random()*0.6; d.scale.set(s, s+Math.random()*0.5, s);
    d.updateMatrix(); mesh.setMatrixAt(i,d.matrix);
  }
  mesh.instanceMatrix.needsUpdate=true; mesh.castShadow=false; mesh.receiveShadow=false;
  mesh.frustumCulled=false;
  scene.add(mesh);
}

function makeSky(){
  const c=document.createElement('canvas'); c.width=2; c.height=256;
  const g=c.getContext('2d').createLinearGradient(0,0,0,256);
  g.addColorStop(0,'#0a1430'); g.addColorStop(0.5,'#1b3a6b'); g.addColorStop(1,'#2f5a93');
  const ctx=c.getContext('2d'); ctx.fillStyle=g; ctx.fillRect(0,0,2,256);
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t;
}
function makeGrassTex(){
  const c=document.createElement('canvas'); c.width=c.height=1024; const x=c.getContext('2d');
  for(let i=0;i<16;i++){ x.fillStyle = i%2? '#2f8a3f':'#2a7d39'; x.fillRect(0,i*64,1024,64); }
  // körnige Grundnoise
  for(let i=0;i<120000;i++){ x.fillStyle=`rgba(${20+Math.random()*30|0},${90+Math.random()*70|0},${40+Math.random()*30|0},.3)`;
    x.fillRect(Math.random()*1024,Math.random()*1024,2,2); }
  // einzelne Grashalme (kurze Striche) für mehr Struktur
  for(let i=0;i<26000;i++){ const gx=Math.random()*1024, gy=Math.random()*1024;
    x.strokeStyle=`rgba(${30+Math.random()*40|0},${110+Math.random()*70|0},${50+Math.random()*30|0},.5)`;
    x.lineWidth=1; x.beginPath(); x.moveTo(gx,gy); x.lineTo(gx+(Math.random()-0.5)*3,gy-2-Math.random()*4); x.stroke(); }
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace;
  t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(4,8); return t;
}

function makeNetTex(){

function makeBallTex(){

function buildPitch(){

  const pitch=new THREE.Mesh(new THREE.PlaneGeometry(70,90),
    new THREE.MeshStandardMaterial({map:gt,bumpMap:gt,bumpScale:0.05,roughness:0.95}));
  pitch.rotation.x=-Math.PI/2; pitch.position.z=-15; pitch.receiveShadow=true; scene.add(pitch);
  // Strafraumlinien
  const lineMat=new THREE.MeshBasicMaterial({color:0xffffff});
  function line(w,d,px,pz){ const m=new THREE.Mesh(new THREE.PlaneGeometry(w,d),lineMat);
    m.rotation.x=-Math.PI/2; m.position.set(px,0.011,pz); scene.add(m);}
  line(40.3,0.12,0,GOAL_Z);            // Torlinie
  line(40.3,0.12,0,GOAL_Z+16.5);       // Strafraum hinten
  line(0.12,16.5,-20.15,GOAL_Z+8.25);
  line(0.12,16.5, 20.15,GOAL_Z+8.25);
  line(18.32,0.12,0,GOAL_Z+5.5);       // 5er
  line(0.12,5.5,-9.16,GOAL_Z+2.75);
  line(0.12,5.5, 9.16,GOAL_Z+2.75);
  const spot=new THREE.Mesh(new THREE.CircleGeometry(0.12,16),lineMat);
  spot.rotation.x=-Math.PI/2; spot.position.set(0,0.011,SPOT_Z); scene.add(spot);
}

function buildGoal(){
  const m=new THREE.MeshStandardMaterial({color:0xffffff,roughness:.5,metalness:.1});
  const r=0.06;
  function bar(len,px,py,pz,axis){ const g=new THREE.CylinderGeometry(r,r,len,12);
    const mesh=new THREE.Mesh(g,m); mesh.castShadow=true; mesh.position.set(px,py,pz);

  back.position.set(0,GOAL_H/2,GOAL_Z-1.6); scene.add(back);

  top.rotation.x=-Math.PI/2; top.position.set(0,GOAL_H,GOAL_Z-0.8); scene.add(top);

    s.rotation.y=Math.PI/2; s.position.set(px,GOAL_H/2,GOAL_Z-0.8); scene.add(s);});
}

  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t;
}

/* ---- Spieler aus Primitiven + Namensschild ---- */
function makePlayer({kit,trim,skin,name,keeper=false,kitMap=null}){
  const g=new THREE.Group();
  const fab=fabricTex();
  const kitMat = kitMap
    ? new THREE.MeshStandardMaterial({map:kitMap,roughness:.7,bumpMap:fab,bumpScale:0.02})
    : new THREE.MeshStandardMaterial({color:kit,roughness:.7,bumpMap:fab,bumpScale:0.02});
  const trimMat=new THREE.MeshStandardMaterial({color:trim,roughness:.7,bumpMap:fab,bumpScale:0.02});
  const skinMat=new THREE.MeshStandardMaterial({color:skin,roughness:.8,bumpMap:fab,bumpScale:0.008});
  const sockMat=new THREE.MeshStandardMaterial({color:trim,roughness:.85});
  const dark=new THREE.MeshStandardMaterial({color:0x141414,roughness:.6});
  const hairMat=new THREE.MeshStandardMaterial({color:0x20140a,roughness:.95});
  const gloveMat=new THREE.MeshStandardMaterial({color:0xff7a1a,roughness:.6});
  function M(geo,mat,x,y,z,parent){ const m=new THREE.Mesh(geo,mat); m.position.set(x,y,z); m.castShadow=true; (parent||g).add(m); return m; }

  // Hüfte/Becken – verbindet Beine und Torso
  M(new THREE.SphereGeometry(0.18,14,10),trimMat,0,0.72,0).scale.set(1.05,0.72,0.82);

  // Beine als Hüft-Gelenke (Pivot) -> Schussanimation dreht das ganze Bein
  function leg(side){ const piv=new THREE.Group(); piv.position.set(0.085*side,0.72,0); g.add(piv);
    M(new THREE.CapsuleGeometry(0.078,0.35,4,8),skinMat,0,-0.24,0,piv);     // Bein
    M(new THREE.CylinderGeometry(0.07,0.06,0.16,8),sockMat,0,-0.55,0,piv);  // Stutzen
    M(new THREE.BoxGeometry(0.12,0.08,0.27),dark,0,-0.66,0.06,piv);          // Schuh
    return piv; }
  const legL=leg(-1); legL.name='legL'; const legR=leg(1); legR.name='legR';

  // Torso – durchgehender Rumpf von Hüfte bis Schulter
  M(new THREE.CylinderGeometry(0.20,0.17,0.5,16),kitMat,0,1.02,0);
  M(new THREE.SphereGeometry(0.205,14,10),kitMat,0,1.24,0).scale.set(1,0.62,0.86); // Schultern

  // Arme als Schulter-Gelenke (Pivot) -> Jubel hebt die Arme
  function arm(side){ const piv=new THREE.Group(); piv.position.set(0.225*side,1.26,0); g.add(piv);
    M(new THREE.CapsuleGeometry(0.055,0.30,4,8),keeper?kitMat:skinMat,0,-0.07,0,piv); // Oberarm
    M(new THREE.CapsuleGeometry(0.05,0.20,4,8),skinMat,0,-0.34,0,piv);                 // Unterarm
    M(new THREE.SphereGeometry(keeper?0.08:0.06,10,10),keeper?gloveMat:skinMat,0,-0.47,0,piv); // Hand
    piv.rotation.z=0.10*side; return piv; }
  const armL=arm(-1); armL.name='armL'; const armR=arm(1); armR.name='armR';

  // Hals + Kopf + Haare (verbunden)
  M(new THREE.CylinderGeometry(0.07,0.085,0.12,10),skinMat,0,1.39,0);
  M(new THREE.SphereGeometry(0.145,18,16),skinMat,0,1.53,0);
  M(new THREE.SphereGeometry(0.15,16,12,0,Math.PI*2,0,Math.PI*0.62),hairMat,0,1.56,0);

  if(name){ const lbl=makeLabel(name); lbl.position.set(0,2.05,0); lbl.name='label'; g.add(lbl); }
  g.userData.legL=legL; g.userData.legR=legR; g.userData.armL=armL; g.userData.armR=armR;
  return g;
}
function makeLabel(text){
  const c=document.createElement('canvas'); c.width=512; c.height=128; const x=c.getContext('2d');
  x.fillStyle='rgba(8,14,30,.5)'; roundRect(x,6,30,500,68,18); x.fill();
  x.strokeStyle='rgba(120,170,255,.45)'; x.lineWidth=3; roundRect(x,6,30,500,68,18); x.stroke();
  x.fillStyle='#fff'; x.font='bold 50px Segoe UI,sans-serif'; x.textAlign='center'; x.textBaseline='middle';
  x.fillText(text,256,66);
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace;
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:t,transparent:true,depthTest:false,opacity:0.7}));
  s.scale.set(1.0,0.25,1); return s;
}
function roundRect(x,X,Y,w,h,r){ x.beginPath(); x.moveTo(X+r,Y); x.arcTo(X+w,Y,X+w,Y+h,r);
  x.arcTo(X+w,Y+h,X,Y+h,r); x.arcTo(X,Y+h,X,Y,r); x.arcTo(X,Y,X+w,Y,r); x.closePath(); }

let diff, myTeam, tournament=null;

function buildTournament(){
  // 32 zufällige Teams, mein Team gesetzt
  const pool = TEAMS.slice(); shuffle(pool);
  if(!pool.find(t=>t.id===myTeam.id)){ pool[0]=myTeam; }
  if(!pool.slice(0,32).find(t=>t.id===myTeam.id)){ pool[31]=myTeam; }
  let teams = pool.slice(0,32);
  if(!teams.find(t=>t.id===myTeam.id)){ teams[0]=myTeam; }
  shuffle(teams);
  tournament = { round:0, teams,
    bracket:[teams.map(t=>({team:t}))] };
}
function currentOpponent(){
  // Gegner = nächstbestes Team, Stärke steigt pro Runde
  const others = tournament.teams.filter(t=>t.id!==myTeam.id);
  shuffle(others);
  return others[0];
}

function startTournament(){
  buildTournament();
  match = newMatch(0);
  showBracket();
}
function newMatch(round){
  return { opp: currentOpponent(), round,
    pk:[], ok:[], idx:0, suddenDeath:false, decided:false };
}

/* =========================================================================
   5) MATCH-LOGIK (Elfmeterschießen)
   ========================================================================= */
function oppStrength(){ const d=DIFFS[diff]; return Math.min(0.97, d.base + match.round*0.07); }

function startMatch(){
  match.pk=[]; match.ok=[]; match.idx=0; match.suddenDeath=false; match.decided=false;
  try{ whistle(); }catch(e){}
  refreshHUD();
  // Schützen-Look setzen

// Bestimmt, ob Spieler schießt (true) oder hält (false) im aktuellen Kick
function playerShootsNow(){ return match.idx % 2 === 0; }

function nextKick(){
  refreshHUD();
  if(checkDecided()){ endMatch(); return; }
  resetBall(); resetKeeperPose();
  keeperTarget=null; keeperDiving=false;
  if(playerShootsNow()) setupPlayerShoot();
  else setupPlayerSave();
}

let phase='idle'; // 'shoot' | 'save' | 'resolving'
let dragStart=null, dragPts=[];

function setShooterFor(team, idx){
  // Farben & Name des aktuellen Schützen anzeigen (wir bauen den Spieler neu)
  const nm = team.players[idx % 3];
  scene.remove(shooter);
  shooter = makePlayer({kit:team.kit,trim:team.trim,skin:SKINS[(team.id+idx)%SKINS.length],
    name:nm, kitMap:kitTexForTeam(team)});
  shooter.position.set(-0.55,0,1.0); scene.add(shooter);
}

function setupPlayerShoot(){
  phase='shoot';
  setShooterFor(myTeam, Math.floor(match.idx/2));
  flyCamera({x:0,y:2.2,z:7},{x:0,y:1.1,z:GOAL_Z});
  hint(`<b>DU SCHIESST</b> — an den Ball klicken/halten und in Richtung Tor <b>wischen</b>. Tempo = Härte, hoch = Höhe, Bogen = Effet.`);
}
function setupPlayerSave(){
  phase='save';
  setShooterFor(match.opp, Math.floor(match.idx/2));
  // gleiche Ansicht wie beim Schießen (hinter dem Elfmeterpunkt, Blick aufs Tor)
  flyCamera({x:0,y:2.2,z:7},{x:0,y:1.1,z:GOAL_Z});
  hint(`<b>DU HÄLTST</b> — gleich schießt der Gegner. <b>Wische</b> in die Ecke, in die du hechtest!`);
  // Gegner schießt nach kurzer Verzögerung
  match._aiTimer = 1.2 + Math.random()*0.8;
  match._aiPending = true;
}

/* ---- Eingabe (Wisch-Geste) ---- */
function pointerXY(e){ const r=renderer.domElement.getBoundingClientRect();
  const p=e.touches?e.touches[0]:e; return {x:p.clientX-r.left,y:p.clientY-r.top}; }
function canInput(){
  if(phase==='shoot') return !ballFlying;
  if(phase==='save'||phase==='resolving_save') return !match._playerDived;
  return false;
}
function onDown(e){ if(!canInput())return;
  dragStart={...pointerXY(e),t:performance.now()}; dragPts=[dragStart]; }
function onMove(e){ if(!dragStart)return; const p=pointerXY(e); dragPts.push({...p,t:performance.now()}); }
function onUp(e){ if(!dragStart)return; const end={...pointerXY(e),t:performance.now()};
  dragPts.push(end); const gesture=analyzeSwipe(dragStart,end,dragPts); dragStart=null;
  if(!gesture)return;
  if(phase==='shoot' && !ballFlying) doPlayerShot(gesture);
  else if(phase==='save'||phase==='resolving_save') doPlayerDive(gesture);
}
function analyzeSwipe(a,b,pts){
  const dx=b.x-a.x, dy=b.y-a.y, dist=Math.hypot(dx,dy);
  if(dist<25) return null;
  const dt=Math.max(0.05,(b.t-a.t)/1000); const speedPx=dist/dt;
  // Krümmung: max. senkrechter Abstand der Zwischenpunkte zur Geraden a->b
  let curv=0; const len=Math.hypot(dx,dy)||1;
  for(const p of pts){ const cross=((p.x-a.x)*dy-(p.y-a.y)*dx)/len; if(Math.abs(cross)>Math.abs(curv))curv=cross; }
  return {dx,dy,dist,speedPx,curv,ex:b.x,ey:b.y};
}

/* ---- Spieler schießt: berechne Flugbahn, Torwart-KI hält ---- */
function doPlayerShot(g){
  // Zielpunkt = dorthin, wo deine Wischlinie endet (auf die Torebene projiziert)
  let aimX, aimY;
  const hit = screenToGoal(g.ex, g.ey);
  if(hit){ aimX = clamp(hit.x, -6, 6); aimY = clamp(hit.y, 0.05, 3.4); }
  else {   // Notfall-Fallback: relative Wischrichtung
    aimX = clamp(g.dx/innerWidth*15, -6, 6);
    aimY = clamp(0.25 + Math.max(0,-g.dy)/innerHeight*5.5, 0.2, 3.1);
  }
  // Schusshärte hängt v.a. von der WISCH-GESCHWINDIGKEIT ab (schnell wischen = harter Schuss)
  const speed= clamp(13 + g.dist/innerHeight*8 + g.speedPx/300, 14, 34);
  const curve= clamp(g.curv/120, -3.2, 3.2);
  launchBall(aimX,aimY,speed,curve);
  // Torwart-KI entscheidet
  aiKeeperGuess(aimX,aimY,speed);
  phase='resolving';
}
/* ---- Spieler hält: Torwart hechtet in Wischrichtung ---- */
function doPlayerDive(g){
  if(match._playerDived)return;
  const dx=clamp(g.dx/innerWidth*9, -POST-0.6, POST+0.6);
  const up=Math.max(0,-g.dy);
  const dy=clamp(0.4 + up/innerHeight*3.2, 0.4, 2.6);
  startKeeperDive(dx,dy);
  match._playerDived=true;
}

/* ---- Ballflug ---- */
function launchBall(aimX,aimY,speed,curve){
  const from=ball.position.clone();
  const horiz=Math.hypot(aimX-from.x, GOAL_Z-from.z);
  const t=horiz/speed;
  const aMag=curve*9;                       // seitliche Magnus-Beschleunigung
  // vx/vy so wählen, dass der Ball TROTZ Kurve & Schwerkraft am Zielpunkt ankommt
  const vx=(aimX-from.x)/t - 0.5*aMag*t;
  const vz=(GOAL_Z-from.z)/t;
  const vy=(aimY-from.y)/t + 0.5*G*t;
  ballVel=new THREE.Vector3(vx,vy,vz);
  ballAcc=new THREE.Vector3(aMag, -G, 0); // Magnus seitlich
  match._shotSpeed=speed;                 // für die Halte-Berechnung (harter Schuss = schwerer zu halten)
  ballFlying=true; match._shotFired=true; match._crossEval=false;
  animateKick(shooter);
  sfxKick();
}

/* ---- Torwart-KI (wenn Spieler schießt) ---- */
function aiKeeperGuess(aimX,aimY,speed){
  const ks=DIFFS[diff].aiSave + match.round*0.06;       // Halte-Können steigt pro Runde
  const guessRight = Math.random() < (0.18 + ks*0.95);   // Legende -> errät fast immer die Ecke
  const err = Math.max(0.22, 1.4*(1-ks));                // hohe Stufe -> sehr präzise am Ball
  let gx = guessRight ? aimX + (Math.random()-0.5)*err*2 : -Math.sign(aimX||1)*(1.5+Math.random()*2);
  let gy = guessRight ? aimY + (Math.random()-0.5)*err   : 0.8+Math.random()*1.4;
  gx=clamp(gx,-POST-0.4,POST+0.4); gy=clamp(gy,0.4,2.4);
  setTimeout(()=>startKeeperDive(gx,gy), 60+Math.random()*120);
}

/* ---- Gegner schießt (wenn Spieler hält) ---- */
function aiShoot(){
  const acc=Math.min(0.99, DIFFS[diff].aiAcc + match.round*0.02);
  const side=Math.random()<0.5?-1:1;
  let aimX = side*(2.4+Math.random()*1.2);          // Richtung Ecke (Legende: enger ins Eck)
  let aimY = 0.4+Math.random()*1.9;
  // Ungenauigkeit -> bei niedrigem Können daneben, bei Legende fast perfekt
  const err=(1-acc)*2.4;
  aimX += (Math.random()-0.5)*err*2; aimY += (Math.random()-0.5)*err;
  const speed=18+Math.random()*6, curve=(Math.random()-0.5)*2.2;
  match._aiAim={x:clamp(aimX,-5,5),y:clamp(aimY,0.15,3.2)};
  launchBall(match._aiAim.x,match._aiAim.y,speed,curve);
  hint(`Schuss! <b>Hechte jetzt</b> in die richtige Ecke!`);
}

/* ---- Keeper-Hechtanimation (bodengebunden, kein Fliegen) ---- */
function resetKeeperPose(){
  keeper.position.copy(keeperHome); keeper.rotation.set(0,Math.PI,0);
  const u=keeper.userData;
  if(u.armL)u.armL.rotation.set(0,0,-0.10); if(u.armR)u.armR.rotation.set(0,0,0.10);
  if(u.legL)u.legL.rotation.set(0,0,0);     if(u.legR)u.legR.rotation.set(0,0,0);
}
function startKeeperDive(tx,ty){
  keeperTarget={x:clamp(tx,-POST-0.5,POST+0.5),y:clamp(ty,0.3,2.6)};
  keeperDiving=true; keeperT=0;
  keeperDur=0.72+Math.min(0.4,Math.abs(tx)*0.07);   // realistischere, ruhigere Hechtgeschwindigkeit
}
function updateKeeper(dt){
  if(!keeperDiving)return;
  keeperT+=dt; const u=Math.min(1,keeperT/keeperDur);
  const tx=keeperTarget.x, ty=keeperTarget.y;
  const ex=1-Math.pow(1-Math.min(1,u/0.6),3);              // volle Streckung bei ~60%
  // seitwärts zur Ecke
  keeper.position.x = tx*ex;
  keeper.position.z = keeperHome.z;
  // Flugbogen: abheben -> kurz fliegen (volle Streckung) -> wieder runter
  const maxH = Math.min(1.2, 0.3 + ty*0.4);               // nicht zu hoch abheben
  keeper.position.y = (u<0.6) ? maxH*Math.sin((u/0.6)*Math.PI/2)
                              : maxH*(1-0.82*((u-0.6)/0.4));
  // Körper waagerecht, KOPF VORAUS – saubere Rotation um die Welt-Z-Achse (kein "fussvoraus")
  const lay = Math.min(1.35, 0.45+Math.abs(tx)*0.38)*ex;
  keeper.quaternion.identity();
  keeper.rotateY(Math.PI);
  keeper.rotateOnWorldAxis(_zAxis, -Math.sign(tx||1)*lay);
  // Arme über Kopf nach vorne AUSGESTRECKT (Richtung Ball)
  const ud=keeper.userData;
  if(ud.armL)ud.armL.rotation.z =  2.7*ex;
  if(ud.armR)ud.armR.rotation.z = -2.7*ex;
  // Beine gestreckt nach hinten (Stromlinie)
  if(ud.legL)ud.legL.rotation.x = -0.32*ex;
  if(ud.legR)ud.legR.rotation.x = -0.32*ex;
  if(u>=1) keeperDiving=false;
}

/* ---- Auflösung am Überqueren der Torlinie ---- */
function evaluateCross(){
  // exakten Punkt berechnen, an dem der Ball die Torlinie (z=GOAL_Z) kreuzt
  const cur=ball.position, prev=ball.userData.prev||cur;
  let x=cur.x, y=cur.y;
  if(prev.z>GOAL_Z && cur.z<prev.z){ const f=(GOAL_Z-prev.z)/(cur.z-prev.z);
    x=prev.x+(cur.x-prev.x)*f; y=prev.y+(cur.y-prev.y)*f; }
  // Im Tor? (Pfosten 3.66, Latte 2.44 – kleine Toleranz, damit das Kreuzeck zählt)
  const inGoal = Math.abs(x) < POST+0.04 && y>0 && y < GOAL_H+0.04;
  // Halten zählt NUR, wenn der Torwart wirklich genau dort ist
  const ky = keeperTarget? keeperTarget.y : 1.0;
  // harter Schuss (hohes Tempo) verkleinert die effektive Reichweite
  const speedFactor = clamp(22/(match._shotSpeed||22), 0.55, 1.3);
  let reach;
  if(phase==='resolving') reach = keeperReachAI() * speedFactor;          // Gegner hält dich
  else reach = keeperReachPlayer() * clamp(speedFactor,0.82,1.3);          // du hältst: sanftere Tempo-Strafe -> mehr Paraden
  const saved = inGoal && keeperTarget && Math.hypot(x-keeperTarget.x, y-ky) < reach;
  resolveOutcome(inGoal && !saved, saved, inGoal);
}
// Reichweite = wie nah der Torwart am Ball sein muss, um zu halten (klein = präzise)
function keeperReachAI(){ return 0.55 + DIFFS[diff].aiSave*1.25 + match.round*0.05; } // ~0.7 (Amateur) .. ~1.75 (Legende)
function keeperReachPlayer(){ return match._playerDived?1.4:0.0; } // richtige Richtung -> du springst zum Ball

function resolveOutcome(goal, saved, onTarget){
  ballFlying=false;
  const iShot = playerShootsNow();
  if(iShot){ match.pk[Math.floor(match.idx/2)] = goal; }
  else     { match.ok[Math.floor(match.idx/2)] = goal; }
  // Flash-Text
  if(goal){ flash(iShot?'TOR! ⚽':'GEGENTOR', iShot?'#3ad36b':'#e8556a'); sfxGoal();
    if(iShot){ burstConfetti(150); celebrateShooter(); } }
  else if(!onTarget){ flash('DANEBEN', '#ffb020'); sfxMiss(); }
  else { flash(iShot?'GEHALTEN!':'PARADE! 🧤', iShot?'#e8556a':'#3ad36b'); sfxSave();
    if(!iShot) burstConfetti(80); }
  match.idx++; match._shotFired=false; match._playerDived=false; match._aiAim=null;
  setTimeout(()=>{ refreshHUD(); nextKick(); }, 1700);
}

/* ---- Entscheidung Best-of-5 / Sudden Death ---- */
function checkDecided(){
  const p=score(match.pk), o=score(match.ok);
  const pt=match.pk.length, ot=match.ok.length;
  if(pt<5||ot<5){
    // vorzeitige Entscheidung
    const pRem=5-pt, oRem=5-ot;
    if(p> o+oRem) return true;
    if(o> p+pRem) return true;
    return false;
  }
  // ab 5: gleicher Stand -> weiter, sonst entschieden wenn beide gleich oft geschossen
  if(pt===ot && p!==o) return true;
  return false;
}
function endMatch(){
  hide('phasehint');
  const p=score(match.pk), o=score(match.ok);
  const win=p>o;
  hideAllOverlays();
  $('result').classList.remove('champion','victory');
  if(win){
    if(match.round>=4){ // Finale gewonnen
      $('result').classList.add('champion');
      try{ crowd(1.6,2.2); }catch(e){}
      burstConfetti(220);
      $('resultTitle').textContent='🏆 WELTMEISTER!';
      $('resultTitle').style.color='#ffd24a';
      $('resultSub').textContent=`${myTeam.name} gewinnt das Finale ${p}:${o} gegen ${match.opp.name}. Du hast das ganze Turnier auf "${DIFFS[diff].label}" gewonnen!`;
      $('resultBtns').innerHTML='';
      addBtn('Neues Turnier',()=>location.reload());
    } else {
      $('result').classList.add('victory');
      try{ crowd(1.4,1.8); }catch(e){}
      burstConfetti(180);
      $('resultTitle').textContent='🎉 SIEG!';
      $('resultTitle').style.color='#ffd24a';
      $('resultSub').textContent=`${myTeam.name} schlägt ${match.opp.name} ${p}:${o}. Auf ins ${ROUND_NAMES[match.round+1]}!`;
      $('resultBtns').innerHTML='';
      addBtn('Nächste Runde ➜',()=>{ match=newMatch(match.round+1); hide('result'); showBracket(); });
    }
  } else {
    $('resultTitle').textContent='❌ Ausgeschieden';
    $('resultTitle').style.color='#e8556a';
    $('resultSub').textContent=`${myTeam.name} verliert ${p}:${o} gegen ${match.opp.name}. Schade — versuch es erneut!`;
    $('resultBtns').innerHTML='';
    addBtn('Nochmal',()=>location.reload());
  }
  hide('hud');
  show('result');
}
function addBtn(label,fn){ const b=document.createElement('button'); b.textContent=label; b.onclick=fn; $('resultBtns').appendChild(b); }

   6) ANIMATION / KAMERA / EFFEKTE

let camTarget=null;
function flyCamera(pos,look){ camTarget={pos:new THREE.Vector3(pos.x,pos.y,pos.z),
  look:new THREE.Vector3(look.x,look.y,look.z)}; }
const _lookAt=new THREE.Vector3();
function animateKick(p){ // kurze Schussanimation: Bein nach vorne
  if(!p)return; const leg=p.userData.legR; if(!leg)return;
  let t=0; const id=setInterval(()=>{ t+=0.05; leg.rotation.x=-Math.sin(Math.min(t,0.5)*Math.PI*2)*0.9;
    if(t>0.5){ leg.rotation.x=0; clearInterval(id);} },16);
}

function loop(){
  const dt=Math.min(0.033, clock.getDelta());

  // Startbildschirm: 3D-Kabine rendern, Spiel pausiert
  if(menuScene && !$('menu').classList.contains('hidden')){
    const et=clock.elapsedTime;
    menuCamera.position.set(Math.sin(et*0.18)*0.9, 1.62+Math.sin(et*0.3)*0.08, 3.2);
    menuCamera.lookAt(0,1.25,-3.5);
    if(menuRonaldo) menuRonaldo.position.y = Math.sin(et*1.7)*0.02;
    drawSwipe();
    renderScene(menuScene,menuCamera);
    return;
  }

  // Kamera sanft bewegen
  if(camTarget){ camera.position.lerp(camTarget.pos,0.08);
    _lookAt.lerp(camTarget.look,0.08); camera.lookAt(_lookAt); }

  // KI-Schuss timing (Spieler hält)
  if(match && match._aiPending){ match._aiTimer-=dt;
    if(match._aiTimer<=0){ match._aiPending=false; match._shotFired=true; phase='resolving_save'; aiShoot(); } }

  // Ballphysik
  if(ballFlying){
    ball.userData.prev = ball.position.clone();   // für exakte Torlinien-Interpolation
    ballVel.addScaledVector(ballAcc,dt);
    ball.position.addScaledVector(ballVel,dt);
    ball.rotation.x+=dt*12; ball.rotation.y+=dt*6;
    if(ball.position.y<BALL_R){ ball.position.y=BALL_R; ballVel.y*=-0.35; ballVel.multiplyScalar(0.7); }
    // Torlinie überquert?
    if(!match._crossEval && ball.position.z<=GOAL_Z){ match._crossEval=true; evaluateCross(); }
    // weit daneben/hinten -> Stop
    if(ball.position.z<GOAL_Z-3 || Math.abs(ball.position.x)>14){ if(!match._crossEval){match._crossEval=true; evaluateCross();} }
  }

  updateKeeper(dt);
  drawSwipe();
  if(grassUniforms) grassUniforms.uTime.value += dt;   // Gras im Wind

  // Namensschilder zur Kamera drehen passiert automatisch (Sprites)
  renderScene(scene,camera);
}

/* ---- Wisch-Spur zeichnen (bleibt nach dem Loslassen kurz sichtbar) ---- */
function drawSwipe(){
  if(!sctx)return;
  sctx.clearRect(0,0,swipeCanvas.width,swipeCanvas.height);
  if(dragStart) trailAlpha=1; else trailAlpha=Math.max(0,trailAlpha-0.018);
  if(trailAlpha<=0 || !dragPts || dragPts.length<2)return;
  const p=dragPts;
  sctx.lineCap='round'; sctx.lineJoin='round';
  sctx.shadowBlur=20; sctx.shadowColor=`rgba(120,200,255,${trailAlpha})`;
  const g=sctx.createLinearGradient(p[0].x,p[0].y,p[p.length-1].x,p[p.length-1].y);
  g.addColorStop(0,`rgba(120,200,255,${trailAlpha*0.15})`);
  g.addColorStop(1,`rgba(255,235,120,${trailAlpha})`);
  sctx.strokeStyle=g; sctx.lineWidth=10;
  sctx.beginPath(); sctx.moveTo(p[0].x,p[0].y);
  for(let i=1;i<p.length;i++) sctx.lineTo(p[i].x,p[i].y);
  sctx.stroke();
  // Pfeilspitze in Wischrichtung
  const a=p[p.length-2], b=p[p.length-1], ang=Math.atan2(b.y-a.y,b.x-a.x);
  sctx.fillStyle=`rgba(255,235,120,${trailAlpha})`;
  sctx.beginPath(); sctx.moveTo(b.x,b.y);
  sctx.lineTo(b.x-16*Math.cos(ang-0.42),b.y-16*Math.sin(ang-0.42));
  sctx.lineTo(b.x-16*Math.cos(ang+0.42),b.y-16*Math.sin(ang+0.42));
  sctx.closePath(); sctx.fill();
  sctx.shadowBlur=0;
}

/* =========================================================================
   7) SOUND (synthetisch, ohne Dateien)
   ========================================================================= */
let actx=null, ambGain=null;
function audio(){ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume(); return actx; }
function tone(f,dur,type='sine',vol=0.2){ const a=audio(); const o=a.createOscillator(),g=a.createGain();
  o.type=type; o.frequency.value=f; g.gain.value=vol; o.connect(g); g.connect(a.destination);
  o.start(); g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur); o.stop(a.currentTime+dur); }
function noise(dur,vol=0.3){ const a=audio(); const b=a.createBuffer(1,a.sampleRate*dur,a.sampleRate);
  const d=b.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
  const s=a.createBufferSource(); s.buffer=b; const g=a.createGain(); g.gain.value=vol;
  s.connect(g); g.connect(a.destination); s.start(); }

// Dauerhafte Stadion-Atmosphäre (gefiltertes Rauschen = Zuschauermenge)
function startAmbience(){ const a=audio(); if(ambGain)return;
  const buf=a.createBuffer(1,a.sampleRate*3,a.sampleRate); const d=buf.getChannelData(0); let last=0;
  for(let i=0;i<d.length;i++){ const w=Math.random()*2-1; last=(last+0.02*w)/1.02; d[i]=last*3.2; }
  const src=a.createBufferSource(); src.buffer=buf; src.loop=true;
  const lp=a.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=850;
  ambGain=a.createGain(); ambGain.gain.value=0.045;
  src.connect(lp); lp.connect(ambGain); ambGain.connect(a.destination); src.start();
}
// Jubel-/Reaktions-Schwall der Menge
function crowd(intensity=1,dur=1.3){ const a=audio();
  const buf=a.createBuffer(1,a.sampleRate*dur,a.sampleRate); const d=buf.getChannelData(0); let last=0;
  for(let i=0;i<d.length;i++){ const w=Math.random()*2-1; last=(last+0.05*w)/1.05; d[i]=last*4; }
  const src=a.createBufferSource(); src.buffer=buf;
  const bp=a.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1100; bp.Q.value=0.5;
  const g=a.createGain(); const t=a.currentTime;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(0.55*intensity,t+0.18);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  src.connect(bp); bp.connect(g); g.connect(a.destination); src.start();
  // kurzer Atmo-Boost
  if(ambGain){ ambGain.gain.cancelScheduledValues(t);
    ambGain.gain.setValueAtTime(0.045,t); ambGain.gain.linearRampToValueAtTime(0.10*intensity,t+0.2);
    ambGain.gain.linearRampToValueAtTime(0.045,t+dur); }
}
// Schiedsrichter-Pfiff (zwei kurze Triller)
function whistle(){ const a=audio(); [0,0.16].forEach(off=>{ const t=a.currentTime+off;
  const o=a.createOscillator(),g=a.createGain(); o.type='sine'; o.frequency.value=2150;
  const lf=a.createOscillator(),lg=a.createGain(); lf.frequency.value=20; lg.gain.value=90;
  lf.connect(lg); lg.connect(o.frequency);
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.22,t+0.02);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.13);
  o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+0.15); lf.start(t); lf.stop(t+0.15); }); }

const sfxKick =()=>{ noise(0.12,0.45); tone(150,0.09,'square',0.18); };
const sfxGoal =()=>{ crowd(1.5,1.8); [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>tone(f,0.45,'triangle',0.15),i*85)); };
const sfxSave =()=>{ noise(0.15,0.35); crowd(0.9,1.1); };
const sfxMiss =()=>{ crowd(0.35,0.9); tone(130,0.3,'sine',0.12); };
// cleaner, weicher Klick (Minecraft-artig: kurzer trockener "Click")
function sfxClick(){ const a=audio(); const t=a.currentTime;
  // kurzer, weicher Ton mit leichtem Pitch-Drop
  const o=a.createOscillator(), g=a.createGain();
  o.type='sine'; o.frequency.setValueAtTime(380,t); o.frequency.exponentialRampToValueAtTime(190,t+0.045);
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.34,t+0.006);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.075);
  o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+0.08);
  // weicher, kurzer Klick-Tick (bandpass = trocken, nicht schrill)
  const b=a.createBuffer(1,a.sampleRate*0.014,a.sampleRate), d=b.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3);
  const ns=a.createBufferSource(); ns.buffer=b;
  const bp=a.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1100; bp.Q.value=0.7;
  const ng=a.createGain(); ng.gain.value=0.14;
  ns.connect(bp); bp.connect(ng); ng.connect(a.destination); ns.start(t);
}

function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.random()*(i+1)|0; [a[i],a[j]]=[a[j],a[i]]; } }

/* ---- Konfetti-Regen bei Toren ---- */
function burstConfetti(n=120){ const cont=$('confetti'); if(!cont)return;
  const cols=['#ff5a5a','#ffd24a','#3ad36b','#4aa3ff','#c879ff','#ff9f43','#2ce0c4'];
  for(let i=0;i<n;i++){ const d=document.createElement('div'); d.className='cf';
    d.style.left=Math.random()*100+'vw'; d.style.top=(-10-Math.random()*25)+'vh';
    d.style.background=cols[(Math.random()*cols.length)|0];
    if(Math.random()<0.3) d.style.borderRadius='50%';
    const dur=1.4+Math.random()*1.6; d.style.animation=`cffall ${dur}s linear forwards`;
    d.style.animationDelay=(Math.random()*0.35)+'s';
    cont.appendChild(d); setTimeout(()=>d.remove(),(dur+0.6)*1000); }
}
/* ---- Jubel-Animation des Schützen (Arme hoch, Hüpfen) ---- */
function celebrateShooter(){ const p=shooter; if(!p)return;
  const aL=p.getObjectByName('armL'), aR=p.getObjectByName('armR');
  let t=0; const id=setInterval(()=>{ t+=0.05;
    p.position.y=Math.abs(Math.sin(t*9))*0.28;
    p.rotation.y=Math.sin(t*4)*0.4;
    if(aL)aL.rotation.z=2.3; if(aR)aR.rotation.z=-2.3;
    if(t>1.7){ clearInterval(id); p.position.y=0; p.rotation.y=0;
      if(aL)aL.rotation.z=0; if(aR)aR.rotation.z=0; } },16);
}
/* ---- Bunte Startseite: ausrastende Strichmännchen-Fans mit Smiley-Köpfen + WM-Pokale ---- */
function initFans(){
  const cv=$('fanbg'); if(!cv)return; const c=cv.getContext('2d');
  function resize(){ cv.width=innerWidth; cv.height=innerHeight; }
  addEventListener('resize',resize); resize();
  const t0=performance.now();

  // Portugal-Trikot, das im Spind hängt
  function jersey(x,y,w,h,num){
    c.strokeStyle='#c9d2de'; c.lineWidth=Math.max(1.5,w*0.045);       // Kleiderbügel
    c.beginPath(); c.arc(x+w*0.5,y-h*0.05,h*0.05,0,7); c.stroke();
    c.fillStyle='#9e0f1a'; c.fillRect(x,y+h*0.05,w*0.22,h*0.22);       // Ärmel
    c.fillRect(x+w*0.78,y+h*0.05,w*0.22,h*0.22);
    c.fillStyle='#c1121f'; c.fillRect(x+w*0.16,y,w*0.68,h);           // Körper
    c.fillStyle='#0a5c2e'; c.fillRect(x+w*0.38,y,w*0.24,h*0.08);      // grüner Kragen
    if(num){ c.fillStyle='#fff'; c.font=`bold ${h*0.36}px Segoe UI,sans-serif`;
      c.textAlign='center'; c.textBaseline='middle'; c.fillText(num,x+w*0.5,y+h*0.56); }
  }
  // Ronaldo (CR7) – stylisierte Figur im Portugal-Trikot
  function ronaldo(cx,footY,s,t){
    const sway=Math.sin(t*1.3)*s*0.02, br=Math.sin(t*1.8)*s*0.012;
    c.save(); c.translate(cx+sway,footY);
    c.fillStyle='rgba(0,0,0,.42)'; c.beginPath(); c.ellipse(0,0,s*0.55,s*0.13,0,0,7); c.fill();
    c.fillStyle='#0e0e0e'; c.fillRect(-s*0.26,-s*0.12,s*0.22,s*0.12); c.fillRect(s*0.04,-s*0.12,s*0.22,s*0.12); // Schuhe
    c.fillStyle='#e0b189'; c.fillRect(-s*0.2,-s*0.62,s*0.16,s*0.52); c.fillRect(s*0.04,-s*0.62,s*0.16,s*0.52); // Beine
    c.fillStyle='#0b3d2e'; c.fillRect(-s*0.26,-s*0.92,s*0.52,s*0.34); // Shorts
    c.fillStyle='#c1121f'; c.fillRect(-s*0.28-br,-s*1.55,s*0.56+br*2,s*0.66); // Trikot
    c.fillStyle='#0a5c2e'; c.fillRect(-s*0.12,-s*1.55,s*0.24,s*0.07); // Kragen
    c.fillStyle='#e0b189'; c.fillRect(-s*0.32,-s*1.28,s*0.64,s*0.13); // verschränkte Arme
    c.fillStyle='#c1121f'; c.fillRect(-s*0.32,-s*1.48,s*0.14,s*0.22); c.fillRect(s*0.18,-s*1.48,s*0.14,s*0.22);
    c.fillStyle='#fff'; c.font=`bold ${s*0.26}px Segoe UI`; c.textAlign='center'; c.textBaseline='middle'; c.fillText('7',0,-s*1.12);
    c.fillStyle='#e0b189'; c.fillRect(-s*0.07,-s*1.68,s*0.14,s*0.16); // Hals
    c.fillStyle='#e8bd95'; c.beginPath(); c.arc(0,-s*1.86,s*0.19,0,7); c.fill(); // Kopf
    c.fillStyle='#241710'; c.beginPath(); c.arc(0,-s*1.9,s*0.2,Math.PI*1.05,Math.PI*1.95); c.fill(); c.fillRect(-s*0.19,-s*1.96,s*0.38,s*0.05); // Haare
    c.strokeStyle='#7a4a35'; c.lineWidth=s*0.02; c.beginPath(); c.arc(0,-s*1.8,s*0.08,0.18*Math.PI,0.82*Math.PI); c.stroke(); // Lächeln
    c.restore();
    const nw=s*1.6, nh=s*0.36;                                        // Nameplate über dem Kopf
    c.fillStyle='rgba(8,14,30,.72)'; roundRect(c,cx-nw/2,footY-s*2.45,nw,nh,nh*0.3); c.fill();
    c.strokeStyle='rgba(255,210,74,.75)'; c.lineWidth=2; roundRect(c,cx-nw/2,footY-s*2.45,nw,nh,nh*0.3); c.stroke();
    c.fillStyle='#ffd24a'; c.font=`bold ${s*0.2}px Segoe UI`; c.textAlign='center'; c.textBaseline='middle';
    c.fillText('CR7 · RONALDO',cx,footY-s*2.45+nh/2);
  }

  function frame(now){ requestAnimationFrame(frame);
    if($('menu').classList.contains('hidden')) return;
    const t=(now-t0)/1000, W=cv.width, H=cv.height;
    // Kabinenwand
    const g=c.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#2b303b'); g.addColorStop(0.6,'#1b1f28'); g.addColorStop(1,'#0d0f13');
    c.fillStyle=g; c.fillRect(0,0,W,H);
    // Deckenstrahler (leichtes Flackern)
    for(let i=0;i<4;i++){ const lx=W*(0.16+0.23*i), fl=0.16+Math.sin(t*3+i)*0.02;
      const lg=c.createRadialGradient(lx,-20,10,lx,H*0.35,H*0.7);
      lg.addColorStop(0,`rgba(255,245,215,${fl})`); lg.addColorStop(1,'rgba(255,245,215,0)');
      c.fillStyle=lg; c.fillRect(0,0,W,H); }
    // Spind-Reihe mit hängenden Portugal-Trikots
    const lockY=H*0.15, lockH=H*0.42, n=Math.max(4,Math.round(W/240)), pad=W*0.05, lw=(W-pad*2)/n;
    const nums=['7','10','11','8','17','21','23','9','18','5'];
    for(let i=0;i<n;i++){ const lx=pad+i*lw;
      c.fillStyle='#3a3026'; c.fillRect(lx+4,lockY,lw-8,lockH);            // Holzfach
      c.fillStyle='#211a13'; c.fillRect(lx+10,lockY+8,lw-20,lockH-16);     // Innenraum
      jersey(lx+lw*0.2,lockY+lockH*0.16,lw*0.6,lockH*0.62,nums[i%nums.length]);
      c.fillStyle='#171109'; c.fillRect(lx+lw*0.2,lockY+lockH-14,lw*0.6,6); // Ablage
    }
    // Holzbank davor
    c.fillStyle='#5a3b22'; c.fillRect(W*0.08,H*0.66,W*0.84,H*0.05);
    c.fillStyle='#3f2817'; c.fillRect(W*0.13,H*0.71,W*0.035,H*0.12); c.fillRect(W*0.83,H*0.71,W*0.035,H*0.12);
    // Boden
    const fg=c.createLinearGradient(0,H*0.82,0,H); fg.addColorStop(0,'#1a1d24'); fg.addColorStop(1,'#101216');
    c.fillStyle=fg; c.fillRect(0,H*0.82,W,H*0.18);
    // Ronaldo mittig im Vordergrund
    ronaldo(W*0.5,H*0.92,Math.min(W*0.9,H)*0.15,t);
    // Vignette
    const vg=c.createRadialGradient(W/2,H*0.48,H*0.22,W/2,H*0.5,H*0.85);
    vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.5)');
    c.fillStyle=vg; c.fillRect(0,0,W,H);
  }
  requestAnimationFrame(frame);
}

/* ---- Detaillierter goldener WM-Pokal (Canvas) ---- */
function drawTrophy(c,cx,cy,s){
  c.save(); c.translate(cx,cy); c.scale(s,s);
  const gold=c.createLinearGradient(-70,-210,70,190);
  gold.addColorStop(0,'#fff6c0'); gold.addColorStop(.28,'#ffd84d');
  gold.addColorStop(.55,'#eaa72a'); gold.addColorStop(.8,'#c8821a'); gold.addColorStop(1,'#9a5d12');
  c.shadowColor='rgba(255,200,70,.85)'; c.shadowBlur=45;
  function ell(y,rx,ry,fill){ c.beginPath(); c.ellipse(0,y,rx,ry,0,0,7); c.fillStyle=fill; c.fill(); }
  // Sockel mit zwei malachitgrünen Ringen
  ell(172,98,26,gold); ell(150,94,17,'#1c7a4a'); ell(134,88,16,gold);
  ell(118,82,15,'#1c7a4a'); ell(102,74,15,gold);
  // Geschwungener Körper (zwei Figuren, die den Globus stemmen)
  c.beginPath(); c.moveTo(-32,102);
  c.bezierCurveTo(-60,42,-32,-28,-46,-92);
  c.bezierCurveTo(-22,-72,-10,-72,0,-74);
  c.bezierCurveTo(10,-72,22,-72,46,-92);
  c.bezierCurveTo(32,-28,60,42,32,102);
  c.bezierCurveTo(12,114,-12,114,-32,102); c.closePath(); c.fillStyle=gold; c.fill();
  // angedeutete Figuren-Trennung
  c.shadowBlur=0; c.strokeStyle='rgba(120,70,12,.55)'; c.lineWidth=3;
  c.beginPath(); c.moveTo(0,-74); c.bezierCurveTo(-6,-18,-6,44,0,98); c.stroke();
  c.beginPath(); c.moveTo(-20,-60); c.bezierCurveTo(-34,0,-20,60,-22,96); c.stroke();
  c.beginPath(); c.moveTo(20,-60); c.bezierCurveTo(34,0,20,60,22,96); c.stroke();
  // Globus oben
  const gg=c.createRadialGradient(-20,-152,8,0,-136,72);
  gg.addColorStop(0,'#fff6c0'); gg.addColorStop(.5,'#ffce3a'); gg.addColorStop(1,'#b1741a');
  c.shadowColor='rgba(255,200,70,.85)'; c.shadowBlur=40;
  c.beginPath(); c.arc(0,-136,60,0,7); c.fillStyle=gg; c.fill();
  c.shadowBlur=0; c.save(); c.beginPath(); c.arc(0,-136,60,0,7); c.clip();
  c.strokeStyle='rgba(120,70,12,.45)'; c.lineWidth=2;
  for(const rx of [60,42,24,8]){ c.beginPath(); c.ellipse(0,-136,rx,60,0,0,7); c.stroke(); }
  for(let yy=-60;yy<=60;yy+=22){ c.beginPath(); c.moveTo(-60,-136+yy); c.lineTo(60,-136+yy); c.stroke(); }
  c.restore();
  // Glanzlichter
  c.fillStyle='rgba(255,255,255,.6)';
  c.beginPath(); c.ellipse(-22,-152,9,16,-0.5,0,7); c.fill();
  c.beginPath(); c.ellipse(-16,30,5,40,0.1,0,7); c.fill();
  c.restore();
}

/* ---- Sieger-Szene: schwebender Pokal + Feuerwerk ---- */
function initWinFX(){
  const cv=$('winfx'); if(!cv)return; const c=cv.getContext('2d');
  let rockets=[],sparks=[],t0=performance.now(),lastLaunch=0;
  function resize(){ cv.width=innerWidth; cv.height=innerHeight; }
  addEventListener('resize',resize); resize();
  function launch(){ rockets.push({x:cv.width*(0.15+Math.random()*0.7), y:cv.height+10,
    vy:-(9+Math.random()*4), ty:cv.height*(0.12+Math.random()*0.34),
    col:`hsl(${Math.random()*360|0},90%,65%)`}); }
  function explode(r){ const n=44+(Math.random()*36|0), hue=Math.random()*360|0;
    for(let i=0;i<n;i++){ const a=Math.random()*7, sp=1+Math.random()*4.2;
      sparks.push({x:r.x,y:r.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,
        col:`hsl(${(hue+Math.random()*50)|0},95%,${58+Math.random()*22|0}%)`}); } }
  function frame(now){ requestAnimationFrame(frame);
    const r=$('result'); const champ=r.classList.contains('champion'), vic=r.classList.contains('victory');
    if((!champ&&!vic)||r.classList.contains('hidden'))return;
    const t=(now-t0)/1000;
    c.fillStyle='rgba(6,8,24,.26)'; c.fillRect(0,0,cv.width,cv.height); // Nachzieh-Effekt
    if(now-lastLaunch>420+Math.random()*380){ lastLaunch=now; launch(); if(Math.random()<0.4)launch(); }
    for(let i=rockets.length-1;i>=0;i--){ const k=rockets[i]; k.y+=k.vy; k.vy+=0.07;
      c.fillStyle=k.col; c.beginPath();c.arc(k.x,k.y,2.6,0,7);c.fill();
      if(k.y<=k.ty||k.vy>=0){ explode(k); rockets.splice(i,1); } }
    for(let i=sparks.length-1;i>=0;i--){ const sp=sparks[i]; sp.x+=sp.vx; sp.y+=sp.vy; sp.vy+=0.06; sp.vx*=0.99; sp.life-=0.011;
      if(sp.life<=0){sparks.splice(i,1);continue;}
      c.globalAlpha=Math.max(0,sp.life); c.fillStyle=sp.col;
      c.beginPath();c.arc(sp.x,sp.y,2.3,0,7);c.fill(); }
    c.globalAlpha=1;
    if(champ){ const by=cv.height*0.44+Math.sin(t*1.7)*24;       // detaillierter Pokal schwebt auf/ab
      drawTrophy(c, cv.width/2, by, Math.min(cv.width,cv.height)/640); }
    else { const by=cv.height*0.42+Math.sin(t*1.9)*28;           // Partie-Sieg: schwebender Pokal-Emoji
      c.save(); c.textAlign='center'; c.textBaseline='middle';
      c.shadowColor='rgba(255,210,80,.9)'; c.shadowBlur=45;
      c.font=`${Math.min(cv.width,cv.height)*0.3}px serif`; c.fillText('🏆',cv.width/2,by); c.restore(); }
  }
  requestAnimationFrame(frame);
}

initThree();
